# ============================================================
# VPN Manager — Standalone Agent Docker Compose
# ============================================================
# This compose file is for running ONLY the agent on a VPN node
# 
# Prerequisites:
#   1. VPN server must be installed and running on the host
#   2. VPN server must have management interface enabled (port 7505)
#   3. Node must be registered in Manager Web UI
#   4. .env file must be configured with credentials
#
# Usage:
#   docker compose up -d
#
# Network Mode:
#   Uses 'host' network mode because:
#   - Agent needs to connect to VPN management interface on host (127.0.0.1:7505)
#   - Agent needs to connect to Manager API on external server
#   - No network isolation needed for standalone agent
#
# Security:
#   - Agent does NOT require NET_ADMIN capability
#   - Agent does NOT require /dev/net/tun access
#   - Agent communicates via OpenVPN Management Interface only
#
# ============================================================

services:
  agent:
    image: ghcr.io/adityadarma/vpn-manager:agent
    container_name: vpn-agent
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AGENT_MANAGER_URL: ${AGENT_MANAGER_URL:?AGENT_MANAGER_URL is required}
      AGENT_NODE_ID: ${AGENT_NODE_ID:?AGENT_NODE_ID is required}
      AGENT_SECRET_TOKEN: ${AGENT_SECRET_TOKEN:?AGENT_SECRET_TOKEN is required}
      VPN_TOKEN: ${VPN_TOKEN:?VPN_TOKEN is required}
      AGENT_POLL_INTERVAL_MS: ${AGENT_POLL_INTERVAL_MS:-5000}
      AGENT_HEARTBEAT_INTERVAL_MS: ${AGENT_HEARTBEAT_INTERVAL_MS:-30000}
      
      # VPN Management Interface Settings
      VPN_MANAGEMENT_HOST: ${VPN_MANAGEMENT_HOST:-127.0.0.1}
      VPN_MANAGEMENT_PORT: ${VPN_MANAGEMENT_PORT:-7505}
      VPN_MANAGEMENT_PASSWORD: ${VPN_MANAGEMENT_PASSWORD:-}
    
    # Use host network for direct access to host VPN management interface
    network_mode: host
    
    # Read-only access to VPN certificates
    volumes:
      - /etc/openvpn/server:/etc/openvpn/server:ro
      - /etc/openvpn/easy-rsa:/etc/openvpn/easy-rsa
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
