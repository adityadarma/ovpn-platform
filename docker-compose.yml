# ============================================================
# VPN Manager — Combined Web + API Docker Compose
# ============================================================
# This compose file uses a single container for both web and api
#
# Usage:
#   docker compose -f docker-compose.yml up -d
#
# Database Options:
#   docker compose -f docker-compose.yml up -d                    # SQLite (default)
#   docker compose -f docker-compose.yml --profile postgres up -d # PostgreSQL
#   docker compose -f docker-compose.yml --profile mysql up -d    # MySQL/MariaDB
# ============================================================

services:
  # ── Databases ──
  postgres:
    image: postgres:16-alpine
    container_name: vpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpn_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ postgres ]
    networks:
      - vpn-network

  mariadb:
    image: mariadb:11
    container_name: vpn-mariadb
    restart: unless-stopped
    environment:
      MARIADB_USER: ${MYSQL_USER:-vpn}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-vpn_secret}
      MARIADB_DATABASE: ${MYSQL_DATABASE:-vpn}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ mysql ]
    networks:
      - vpn-network

  # ── VPN Manager (Web + API) ──
  manager:
    image: ghcr.io/adityadarma/vpn-manager:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn-manager
    restart: unless-stopped
    environment:
      # API Environment Variables
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_REGISTRATION_KEY: ${NODE_REGISTRATION_KEY}
      VPN_TOKEN: ${VPN_TOKEN}
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SQLITE_PATH: /data/vpn.sqlite
      # Web Environment Variables
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${WEB_PORT:-3000}:3000"
      - "${API_PORT:-3001}:3001"
    volumes:
      - manager_data:/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mariadb:
        condition: service_healthy
        required: false
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 && curl -f http://localhost:3001/api/v1/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vpn-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vpn-network:
    driver: bridge

volumes:
  postgres_data:
  mariadb_data:
  manager_data:
