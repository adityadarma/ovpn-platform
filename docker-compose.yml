services:
  # ── Databases ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ovpn
      POSTGRES_PASSWORD: ovpn_secret
      POSTGRES_DB: ovpn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ovpn" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ postgres ]

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_USER: ovpn
      MARIADB_PASSWORD: ovpn_secret
      MARIADB_DATABASE: ovpn
      MARIADB_ROOT_PASSWORD: root_secret
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ mysql ]

  # ── Manager API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SQLITE_PATH: /data/ovpn.sqlite
    ports:
      - "3001:3001"
    volumes:
      - api_data:/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mariadb:
        condition: service_healthy
        required: false
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web UI ────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:3001}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  # ── VPN Agent (example — typically on a separate server) ──
  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    restart: unless-stopped
    environment:
      AGENT_MANAGER_URL: ${AGENT_MANAGER_URL:-http://api:3001}
      AGENT_NODE_ID: ${AGENT_NODE_ID}
      AGENT_SECRET_TOKEN: ${AGENT_SECRET_TOKEN}
    network_mode: host # Needs host networking for iptables access
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    profiles: [ agent ]

volumes:
  postgres_data:
  mariadb_data:
  api_data:
