# ============================================================
# OpenVPN Manager — Production Docker Compose
# ============================================================
# Uses pre-built images from GitHub Container Registry
#
# Quick Start:
#   docker compose pull
#   docker compose up -d
#
# Local Build (if you modify code):
#   docker compose build
#   docker compose up -d
#
# Database Options:
#   docker compose up -d                    # SQLite (default)
#   docker compose --profile postgres up -d # PostgreSQL
#   docker compose --profile mysql up -d    # MySQL/MariaDB
#
# With Agent:
#   docker compose --profile agent up -d
# ============================================================

services:
  # ── Databases ──
  postgres:
    image: postgres:16-alpine
    container_name: ovpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ovpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ovpn_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ovpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ovpn}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ postgres ]
    networks:
      - ovpn-network

  mariadb:
    image: mariadb:11
    container_name: ovpn-mariadb
    restart: unless-stopped
    environment:
      MARIADB_USER: ${MYSQL_USER:-ovpn}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-ovpn_secret}
      MARIADB_DATABASE: ${MYSQL_DATABASE:-ovpn}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ mysql ]
    networks:
      - ovpn-network

  # ── Manager API ──
  api:
    # Pre-built image from GitHub Container Registry
    image: ghcr.io/adityadarma/ovpn-manager:api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: ovpn-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SQLITE_PATH: /data/ovpn.sqlite
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    volumes:
      - api_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${API_PORT:-3001}/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ovpn-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Web UI ──
  web:
    # Pre-built image from GitHub Container Registry
    image: ghcr.io/adityadarma/ovpn-manager:web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: ovpn-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ovpn-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── VPN Agent ──
  agent:
    # Pre-built image from GitHub Container Registry
    image: ghcr.io/adityadarma/ovpn-manager:agent
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
    container_name: ovpn-agent
    restart: unless-stopped
    environment:
      NODE_ENV: production
      AGENT_MANAGER_URL: ${AGENT_MANAGER_URL:?AGENT_MANAGER_URL is required}
      AGENT_NODE_ID: ${AGENT_NODE_ID:?AGENT_NODE_ID is required}
      AGENT_SECRET_TOKEN: ${AGENT_SECRET_TOKEN:?AGENT_SECRET_TOKEN is required}
      AGENT_POLL_INTERVAL_MS: ${AGENT_POLL_INTERVAL_MS:-5000}
      AGENT_HEARTBEAT_INTERVAL_MS: ${AGENT_HEARTBEAT_INTERVAL_MS:-30000}
    networks:
      - ovpn-network
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - /etc/openvpn/server:/etc/openvpn/server:ro
      - /etc/openvpn/easy-rsa:/etc/openvpn/easy-rsa
    profiles: [ agent ]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ovpn-network:
    driver: bridge

volumes:
  postgres_data:
  mariadb_data:
  api_data:
