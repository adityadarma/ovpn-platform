# ============================================================
# VPN Manager — Production Docker Compose
# ============================================================
# Uses pre-built images from GitHub Container Registry
#
# Quick Start:
#   docker compose pull
#   docker compose up -d
#
# Local Build (if you modify code):
#   docker compose build
#   docker compose up -d
#
# Database Options:
#   docker compose up -d                    # SQLite (default)
#   docker compose --profile postgres up -d # PostgreSQL
#   docker compose --profile mysql up -d    # MySQL/MariaDB
# ============================================================

services:
  # ── Databases ──
  postgres:
    image: postgres:16-alpine
    container_name: vpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpn_secret}
      POSTGRES_DB: ${POSTGRES_DB:-vpn}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ postgres ]
    networks:
      - vpn-network

  mariadb:
    image: mariadb:11
    container_name: vpn-mariadb
    restart: unless-stopped
    environment:
      MARIADB_USER: ${MYSQL_USER:-vpn}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-vpn_secret}
      MARIADB_DATABASE: ${MYSQL_DATABASE:-vpn}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [ mysql ]
    networks:
      - vpn-network

  # ── Manager API ──
  api:
    # Pre-built image from GitHub Container Registry
    image: ghcr.io/adityadarma/vpn-manager:api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vpn-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3001}
      WEB_URL: ${WEB_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_REGISTRATION_KEY: ${NODE_REGISTRATION_KEY}
      VPN_TOKEN: ${VPN_TOKEN}
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SQLITE_PATH: /data/vpn.sqlite
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    volumes:
      - api_data:/data
    # Wait for database if using postgres or mysql
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mariadb:
        condition: service_healthy
        required: false
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${API_PORT:-3001}/api/v1/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vpn-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Web UI ──
  web:
    # Pre-built image from GitHub Container Registry
    image: ghcr.io/adityadarma/vpn-manager:web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: vpn-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    # Wait for API to be healthy before starting
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - vpn-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vpn-network:
    driver: bridge

volumes:
  postgres_data:
  mariadb_data:
  api_data:
