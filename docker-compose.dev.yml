# ============================================================
# OVPN Platform — Development Docker Compose
# ============================================================
# Usage:
#   docker compose -f docker-compose.dev.yml up
#   docker compose -f docker-compose.dev.yml --profile postgres up
#   docker compose -f docker-compose.dev.yml --profile mysql up
# ============================================================

services:
  # ── Development Databases ──
  postgres:
    image: postgres:16-alpine
    container_name: ovpn-postgres-dev
    environment:
      POSTGRES_USER: ovpn
      POSTGRES_PASSWORD: ovpn_dev
      POSTGRES_DB: ovpn_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ovpn" ]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [ postgres ]
    networks:
      - ovpn-dev-network

  mariadb:
    image: mariadb:11
    container_name: ovpn-mariadb-dev
    environment:
      MARIADB_USER: ovpn
      MARIADB_PASSWORD: ovpn_dev
      MARIADB_DATABASE: ovpn_dev
      MARIADB_ROOT_PASSWORD: root_dev
    volumes:
      - mariadb_dev_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: [ mysql ]
    networks:
      - ovpn-dev-network

  # ── Development API — Hot-reload with tsx watch ──
  api:
    image: node:24-alpine
    container_name: ovpn-api-dev
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter @ovpn/api dev"
    environment:
      NODE_ENV: development
      PORT: "3001"
      JWT_SECRET: dev-secret-please-change-in-production-32chars
      JWT_EXPIRES_IN: 7d
      DATABASE_TYPE: ${DATABASE_TYPE:-sqlite}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_SQLITE_PATH: /data/ovpn.sqlite
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - api_dev_data:/data
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules_cache:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      mariadb:
        condition: service_healthy
        required: false
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ovpn-dev-network

  # ── Development Web UI — Next.js dev server with hot-reload ──
  web:
    image: node:24-alpine
    container_name: ovpn-web-dev
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter @ovpn/web dev"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules_cache:/app/node_modules
      - /app/apps/web/.next
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ovpn-dev-network

  # ── Development Agent (optional) ──
  agent:
    image: node:24-alpine
    container_name: ovpn-agent-dev
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm --filter @ovpn/agent dev"
    environment:
      NODE_ENV: development
      AGENT_MANAGER_URL: ${AGENT_MANAGER_URL:-http://api:3001}
      AGENT_NODE_ID: ${AGENT_NODE_ID:-dev-node-1}
      AGENT_SECRET_TOKEN: ${AGENT_SECRET_TOKEN:-dev-token}
      AGENT_POLL_INTERVAL_MS: 5000
      AGENT_HEARTBEAT_INTERVAL_MS: 30000
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules_cache:/app/node_modules
    network_mode: host
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    profiles: [ agent ]

networks:
  ovpn-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
  mariadb_dev_data:
  api_dev_data:
  pnpm_store:
  node_modules_cache:
