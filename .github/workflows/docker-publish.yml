name: Build and Push Docker Images

on:
  # Manual trigger only (default)
  workflow_dispatch:
    inputs:
      services:
        description: 'Services to build (comma-separated: api,web,agent or "all")'
        required: true
        default: 'all'
        type: string
      push_images:
        description: 'Push images to registry'
        required: true
        default: true
        type: boolean
  
  push:
    # Auto-trigger on version tags
    tags:
      - 'v*.*.*'
    
    # Auto-trigger on version tags and optionally on file changes
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'apps/agent/**'
      - 'packages/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ovpn-manager

jobs:
  # Determine which services to build
  prepare:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
      should_build: ${{ steps.set-services.outputs.should_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2
      
      - name: Determine services to build
        id: set-services
        run: |
          # Default: build all services
          SERVICES='["api","web","agent"]'
          SHOULD_BUILD="true"
          
          # If manual trigger with specific services
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.services }}"
            if [ "$INPUT" != "all" ]; then
              # Convert comma-separated to JSON array
              SERVICES=$(echo "$INPUT" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$";""))')
            fi
            SHOULD_BUILD="${{ inputs.push_images }}"
          fi
          
          # If triggered by tag, build all
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            SERVICES='["api","web","agent"]'
            SHOULD_BUILD="true"
          fi
          
          # If triggered by push, detect changed files
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" != refs/tags/* ]]; then
            CHANGED_SERVICES=()
            
            # Check which apps changed
            if git diff --name-only HEAD^ HEAD | grep -q "^apps/api/"; then
              CHANGED_SERVICES+=("api")
            fi
            if git diff --name-only HEAD^ HEAD | grep -q "^apps/web/"; then
              CHANGED_SERVICES+=("web")
            fi
            if git diff --name-only HEAD^ HEAD | grep -q "^apps/agent/"; then
              CHANGED_SERVICES+=("agent")
            fi
            
            # Check if shared packages changed (rebuild all)
            if git diff --name-only HEAD^ HEAD | grep -q "^packages/"; then
              CHANGED_SERVICES=("api" "web" "agent")
            fi
            
            # If no services changed, skip build
            if [ ${#CHANGED_SERVICES[@]} -eq 0 ]; then
              echo "No service files changed, skipping build"
              SHOULD_BUILD="false"
            else
              SERVICES=$(printf '%s\n' "${CHANGED_SERVICES[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            fi
          fi
          
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "Services to build: $SERVICES"
          echo "Should build: $SHOULD_BUILD"

  build-and-push:
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service: ${{ fromJson(needs.prepare.outputs.services) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ matrix.service }}
            type=raw,value=${{ matrix.service }}-{{branch}},enable=${{ github.ref != format('refs/heads/{0}', 'main') }}
            type=semver,pattern={{version}}-${{ matrix.service }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push_images == true) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
      
      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"
  
  test-deployment:
    needs: [prepare, build-and-push]
    if: needs.prepare.outputs.should_build == 'true' && (github.event_name != 'workflow_dispatch' || inputs.push_images == true)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create test environment
        run: |
          cp .env.production .env
          
          # Set test JWT secret
          sed -i 's/CHANGE_ME_TO_SECURE_RANDOM_STRING_MIN_32_CHARS/test-secret-key-for-ci-testing-only-32chars/' .env
          
          # Set WEB_URL for CORS
          sed -i 's|WEB_URL=http://localhost:3000|WEB_URL=http://localhost:3000|' .env
          
          # Add dummy agent variables to prevent errors (agent won't start without profile)
          echo "" >> .env
          echo "# Agent (not used in test)" >> .env
          echo "AGENT_MANAGER_URL=http://localhost:3001" >> .env
          echo "AGENT_NODE_ID=test-node-id" >> .env
          echo "AGENT_SECRET_TOKEN=test-secret-token" >> .env
      
      - name: Start services
        run: |
          docker compose pull api web
          docker compose up -d api web
          echo "Waiting for services to be ready..."
          
          # Wait for API to be healthy (max 2 minutes)
          for i in {1..24}; do
            if docker compose ps api | grep -q "healthy"; then
              echo "API is healthy!"
              break
            fi
            echo "Waiting for API... ($i/24)"
            sleep 5
          done
          
          # Additional wait for web
          sleep 10
      
      - name: Check service health
        run: |
          echo "Testing API health endpoint..."
          curl -f http://localhost:3001/api/v1/health || exit 1
          
          echo "Testing Web UI..."
          curl -f http://localhost:3000 || exit 1
          
          echo "All services are healthy!"
      
      - name: View logs on failure
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker compose logs api
          echo "=== Web Logs ==="
          docker compose logs web
      
      - name: Cleanup
        if: always()
        run: |
          docker compose down -v
